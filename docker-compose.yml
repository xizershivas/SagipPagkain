services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Password1"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password1 -No -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/database_setup.sql:/scripts/database_setup.sql
    entrypoint: ["/opt/mssql-tools18/bin/sqlcmd", "-S", "db,1433", "-U", "sa", "-P", "Password1", "-No", "-i", "/scripts/database_setup.sql"]
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "5198:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=SagipPagkainDB;User Id=sa;Password=Password1;TrustServerCertificate=True;"
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqldata:
  uploads:
